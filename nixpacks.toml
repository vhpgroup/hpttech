providers = ["node"]

[variables]
NIXPACKS_NODE_VERSION = "22"
NPM_CONFIG_PRODUCTION = "false"
PUPPETEER_SKIP_DOWNLOAD = "1"
PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD = "1"

[phases.setup]
nixPkgs = ["nodejs_22", "npm-10_x"]
aptPkgs = [
  "curl",
  "wget",
  "libnss3",
  "libatk1.0-0",
  "libatk-bridge2.0-0",
  "libcups2",
  "libgbm1",
  "libasound2t64",
  "libpangocairo-1.0-0",
  "libxss1",
  "libgtk-3-0",
  "libxshmfence1",
  "libglu1"
]

[phases.install]
cmds = ["npm ci"]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "node scripts/apply-startup-migrations.cjs && npm run start"
