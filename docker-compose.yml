services:
  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-payload}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-payload}
      POSTGRES_DB: ${POSTGRES_DB:-hpttech_payload}
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-payload} -d ${POSTGRES_DB:-hpttech_payload} -h localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URI=postgres://payload:payload@postgres:5432/hpttech_payload
      - NODE_ENV=development
      - PAYLOAD_SECRET=${PAYLOAD_SECRET:-dev-payload-secret-change-me}
    depends_on:
      - postgres
    command: sh -c "node ./scripts/wait-for-postgres.js 'npm install --legacy-peer-deps && npm run dev'"
    restart: unless-stopped

volumes:
  postgres-data:
